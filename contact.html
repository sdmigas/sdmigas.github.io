<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cv Website HTML</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<body>
    <style>
        
        .header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000000(0, 0, 0, 0.9);
            color: #fff;
            z-index: 1000;
            padding: 10px 0;
            text-align: center;
            transition: top 0.3s ease; 
        }

        .hide-header {
            top: -100px; 
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .navbar a {
            text-decoration: none;
            color: #FFFFFF;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #c8d6b1;
        }


        .Home {
            padding: 40px 20px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
        }

        .Education-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
        }

        .Education-content > ul {
            flex: 1;
            max-width: 48%;
            padding: 20px;
            background-color: #111111;
            border-radius: 8px;
        }

        .Education-content h3 {
            color: #c8d6b1;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .Education-content a {
            color: #c8d6b1;
            text-decoration: none;
            font-weight: 500;
        }

        /* Mobile responsiveness (when screen is smaller than 768px) */
        @media (max-width: 768px) {
            .Education-content > ul {
                max-width: 100%;
            }
        }

    </style>


    <header class="header">

        <nav class="navbar">

                0224349317

            </p>
